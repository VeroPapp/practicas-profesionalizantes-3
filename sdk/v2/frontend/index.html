    // =========================================
    // COMPONENTE LOGIN Y REGISTER
    // =========================================

    class AuthSection extends HTMLElement {

        constructor() {
            super();

            // CONTENEDOR
            this.container = document.createElement("div");

            // TITULO PRINCIPAL
            this.mainTitle = document.createElement("h1");
            this.mainTitle.textContent = "Sistema de autenticación";

            // =========================================
            // ELEMENTOS DEL LOGIN
            // =========================================  
            this.loginTitle = document.createElement("h2");
            this.loginTitle.textContent = "Login";

            this.loginForm = document.createElement("form");

            this.loginUserInput = document.createElement("input");
            this.loginUserInput.placeholder = "Usuario";
            this.loginUserInput.name = "username";

            this.loginPasswordInput = document.createElement("input");
            this.loginPasswordInput.placeholder = "Password";
            this.loginPasswordInput.name = "password";
            this.loginPasswordInput.type = "password";

            this.loginButton = document.createElement("button");
            this.loginButton.textContent = "Ingresar";

            // =========================================
            // ELEMENTOS DEL REGISTER
            // =========================================    
            this.registerTitle = document.createElement("h2");
            this.registerTitle.textContent = "Registro";

            this.registerForm = document.createElement("form");

            this.registerUserInput = document.createElement("input");
            this.registerUserInput.placeholder = "Usuario";
            this.registerUserInput.name = "username";

            this.registerPasswordInput = document.createElement("input");
            this.registerPasswordInput.placeholder = "Password";
            this.registerPasswordInput.name = "password";
            this.registerPasswordInput.type = "password";

            this.registerButton = document.createElement("button");
            this.registerButton.textContent = "Crear usuario";

            // =========================================
            // APPEND
            // =========================================
            
            // LOGIN
            this.loginForm.appendChild(this.loginUserInput);
            this.loginForm.appendChild(document.createElement("br"));

            this.loginForm.appendChild(this.loginPasswordInput);
            this.loginForm.appendChild(document.createElement("br"));

            this.loginForm.appendChild(this.loginButton);

            // REGISTER
            this.registerForm.appendChild(this.registerUserInput);
            this.registerForm.appendChild(document.createElement("br"));

            this.registerForm.appendChild(this.registerPasswordInput);
            this.registerForm.appendChild(document.createElement("br"));

            this.registerForm.appendChild(this.registerButton);

            // CONTAINER
            this.container.appendChild(this.mainTitle);

            this.container.appendChild(document.createElement("hr"));

            this.container.appendChild(this.loginTitle);
            this.container.appendChild(this.loginForm);

            this.container.appendChild(document.createElement("hr"));

            this.container.appendChild(this.registerTitle);
            this.container.appendChild(this.registerForm);

            this.appendChild(this.container);
        }

        // =========================================
        // MÉTODOS PARA LOGIN Y REGISTER
        // =========================================

        async onLoginSubmit(event) {

            event.preventDefault(); // Evita que el formulario se envíe de forma tradicional y recargue la página

            const formData = new FormData(this.loginForm);
            const data = new URLSearchParams(formData);

            try {

                const response = await fetch('/login', {
                    method: 'POST',
                    body: data
                });

                const result = await response.json();

                if (result.status) {

                    alert("Login correcto ✅");
                    this.loginForm.reset();

                } else {

                    alert("Login incorrecto ❌");
                }

            } catch (error) {

                console.error(error);
                alert("Error de conexión");
            }
        }

        async onRegisterSubmit(event) {

            event.preventDefault();

            const formData = new FormData(this.registerForm);
            const data = new URLSearchParams(formData);

            try {

                const response = await fetch('/register', {
                    method: 'POST',
                    body: data
                });

                const result = await response.json();
                
                const messages = {
                    USER_ALREADY_EXISTS: "El nombre de usuario ya existe ❌"
                };

                if (result.status) {

                    alert("Usuario creado correctamente ✅");
                    this.registerForm.reset(); // Limpiar formulario después de crear usuario

                } else { 

                    //else 👉 “el servidor respondió, pero dijo que no se pudo hacer”
                    alert(messages[result.description] || "No se pudo crear el usuario ❌");
                }

            } catch (error) {

                //catch 👉 “no se pudo conectar con el servidor”
                console.error(error);
                alert("Error registrando usuario");
            }
        }

        connectedCallback() {

            this.loginForm.onsubmit = this.onLoginSubmit.bind(this);
            this.registerForm.onsubmit = this.onRegisterSubmit.bind(this);
        }

        disconnectedCallback() {

            this.loginForm.onsubmit = null;
            this.registerForm.onsubmit = null;
        }
    }

    customElements.define("x-auth", AuthSection);

                // limpiar tabla para evitar que se dupliquen los usuarios cada vez que se hace click en "Obtener usuarios"
