<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Autenticación y Autorización</title>
</head>

<body>

    <!-- ===================================== -->
    <!-- LOGIN -->
    <!-- ===================================== -->

    <h1>Login</h1>

    <label>Usuario:</label>
		<input type="text" id="username">
    <br><br>

    <label>Password:</label>
    	<input type="password" id="password">
    <br><br>

    <button id="btnLogin">Iniciar sesión</button>

    <button id="btnLogout">Cerrar sesión</button>

    <hr>

    <!-- ===================================== -->
    <!-- SESION -->
    <!-- ===================================== -->

    <h2>Sesión actual:</h2>

    <div id="sessionInfo">Ninguna</div>

    <hr>

    <!-- ===================================== -->
    <!-- PRUEBAS -->
    <!-- ===================================== -->

    <h2>Endpoints protegidos</h2>

    <button id="btnLog">Ejecutar /log</button>

    <br><br>

    <button id="btnSayHello">Ejecutar /sayHello</button>

    <hr>

    <!-- ===================================== -->
    <!-- RESULTADO -->
    <!-- ===================================== -->

    <h2>Resultado</h2>

    <div id="output"></div>

</body>

<script>
    // =====================================
    // CONFIG
    // =====================================

    const CONFIG = {
        api_url: 'http://localhost:8080',
        api_version: "1.0"
    };


    // =====================================
    // SESION
    // =====================================

    let current_username = null;
    let current_password = null;

    // =====================================
    // OUTPUT
    // =====================================

    function show_output(message) {
        document.getElementById("output").innerHTML = message;
    }

    // =====================================
    // RPC HEADERS
    // =====================================

    function getRPCApiHeaders() {

        return {
            'Content-Type': 'application/json',
            'x-api-version': CONFIG.api_version,
            'x-user-id': current_username,
            'x-api-key': current_password
        };
    }

    // =====================================
    // RPC REQUEST
    // =====================================

    async function RPCApiFetch(path, input = {}) {

        const response = await fetch(CONFIG.api_url + path,
            {
                method: "POST",
                headers: getRPCApiHeaders(),
                body: JSON.stringify(input)
            }
        );
        console.log(response.status);

        switch (response.status) {

            case 200:
                return await response.json();

            case 400:
                throw new Error("Bad Request");

            case 401:
                throw new Error("Unauthorized");

            case 422:
                throw new Error("Domain Error");

            case 500:
                throw new Error("Server Error");

            default:
                throw new Error("Unknown Error");
        }
    }

    // =====================================
    // SESSION INFO
    // =====================================

    function update_session_info() {
        const session_info = document.getElementById("sessionInfo");

        if (current_username == null) {
            session_info.innerHTML = "Ninguna";
        }
        else{
			session_info.innerHTML = current_username;
        }
    }

    // =====================================
    // LOGIN
    // =====================================

    async function on_login_click() {

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        try {

            current_username = username;
            current_password = password;

            const result = await RPCApiFetch('/login', {});

            console.log(result);

            update_session_info();

            show_output("✅ Login correcto");
        }
        catch(err) {

            console.error(err);

            current_username = null;
            current_password = null;

            show_output("❌ Login incorrecto");
        }
    }

    // =====================================
    // LOGOUT
    // =====================================

    async function on_logout_click() {
        current_username = null;
        current_password = null;

        update_session_info();

        show_output("Sesión cerrada");
    }

    // =====================================
    // /LOG
    // =====================================

    async function on_log_click() {

        try {

            const result = await RPCApiFetch('/log', {});

            console.log(result);

            show_output("✅ Acceso permitido a /log");
        }
        catch(err) {

            console.error(err);

            show_output("❌ Acceso denegado a /log");
        }
    }

    // =====================================
    // /SAYHELLO
    // =====================================

    async function on_say_hello_click() {

        try {

            const result = await RPCApiFetch('/sayHello', {});

            console.log(result);

            show_output("✅ Acceso permitido a /sayHello");
        }
        catch(err) {

            console.error(err);

            show_output("❌ Acceso denegado a /sayHello");
        }
    }

    // =====================================
    // MAIN
    // =====================================

    function main(){
        update_session_info();

        document.getElementById("btnLogin").onclick = on_login_click;
        document.getElementById("btnLogout").onclick = on_logout_click;
        document.getElementById("btnLog").onclick =on_log_click;
        document.getElementById("btnSayHello").onclick =on_say_hello_click;
    }

    window.onload = main;

</script>

</html>
